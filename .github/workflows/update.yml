name: Update IP_PL list

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Pobierz strefę PL z ipdeny
        run: |
          curl -s https://www.ipdeny.com/ipblocks/data/aggregated/pl-aggregated.zone \
            -o pl.zone

      - name: Generuj plik .rsc
        run: |
          while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\r')
            [ -z "$line" ] && continue
            echo "/ip firewall address-list add list=IP_PL address=$line comment=ipdeny_PL"
          done < pl.zone > IP_PL.rsc
          echo "Wpisów: $(wc -l < IP_PL.rsc)"

      - name: Usuń stary release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Utwórz nowy release z plikiem
        run: |
          gh release create latest IP_PL.rsc \
            --title "IP_PL latest" \
            --notes "Automatyczna aktualizacja: $(date -u '+%Y-%m-%d')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

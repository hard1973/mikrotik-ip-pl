name: Update IP_PL list

on:
  schedule:
    - cron: '2 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Download PL zone from ipdeny
        run: |
          curl -s https://www.ipdeny.com/ipblocks/data/aggregated/pl-aggregated.zone \
            -o pl.zone

      - name: Generate .rsc file
        run: |
          while IFS= read -r line; do
            line=$(echo "$line" | tr -d '\r')
            [ -z "$line" ] && continue
            echo "/ip firewall address-list add list=IP_PL address=$line comment=ipdeny_PL"
          done < pl.zone > IP_PL.rsc
          echo "Entries: $(wc -l < IP_PL.rsc)"

      - name: Delete old release
        run: gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new release with file
        run: |
          gh release create latest IP_PL.rsc \
            --title "IP_PL latest" \
            --notes "Automatic update: $(date -u '+%Y-%m-%d')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
